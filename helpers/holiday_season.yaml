{% set year = now().year %}
{% set md = now().strftime('%m-%d') %}

{% set a = year % 19 %}
{% set b = year // 100 %}
{% set c = year % 100 %}
{% set d = b // 4 %}
{% set e = b % 4 %}
{% set f = (b + 8) // 25 %}
{% set g = (b - f + 1) // 3 %}
{% set h = (19 * a + b - d - g + 15) % 30 %}
{% set i = c // 4 %}
{% set k = c % 4 %}
{% set l = (32 + 2 * e + 2 * i - h - k) % 7 %}
{% set m = (a + 11 * h + 22 * l) // 451 %}
{% set easter_month = (h + l - 7 * m + 114) // 31 %}
{% set easter_day = ((h + l - 7 * m + 114) % 31) + 1 %}
{% set easter_ts = strptime(year ~ '-' ~ '%02d-%02d' % (easter_month, easter_day), '%Y-%m-%d').timestamp() %}
{% set easter_minus7 = (easter_ts - 86400 * 7) | timestamp_custom('%m-%d', true) %}
{% set easter_plus1 = (easter_ts + 86400) | timestamp_custom('%m-%d', true) %}
{% set easter_str = '%02d-%02d' % (easter_month, easter_day) %}

{% set nov1_dow = strptime(year ~ '-11-01', '%Y-%m-%d').weekday() %}
{% set days_to_thu = (3 - nov1_dow) % 7 %}
{% set tday = 1 + days_to_thu + 21 %}
{% set tgiving_ts = strptime(year ~ '-11-' ~ '%02d' % tday, '%Y-%m-%d').timestamp() %}
{% set tgiving_str = tgiving_ts | timestamp_custom('%m-%d', true) %}
{% set tgiving_minus7 = (tgiving_ts - 86400 * 7) | timestamp_custom('%m-%d', true) %}
{% set tgiving_plus1 = (tgiving_ts + 86400) | timestamp_custom('%m-%d', true) %}

{% set jan1_dow = strptime(year ~ '-01-01', '%Y-%m-%d').weekday() %}
{% set days_to_sun = (6 - jan1_dow) % 7 %}
{% set third_sun = 1 + days_to_sun + 14 %}
{% set stock_show_ts = strptime(year ~ '-01-' ~ '%02d' % third_sun, '%Y-%m-%d').timestamp() %}
{% set stock_show_end = stock_show_ts | timestamp_custom('%m-%d', true) %}
{% set stock_show_plus1 = (stock_show_ts + 86400) | timestamp_custom('%m-%d', true) %}

{% set may31_dow = strptime(year ~ '-05-31', '%Y-%m-%d').weekday() %}
{% set memorial_ts = strptime(year ~ '-05-31', '%Y-%m-%d').timestamp() - (86400 * may31_dow) %}
{% set memorial_str = memorial_ts | timestamp_custom('%m-%d', true) %}
{% set memorial_minus3 = (memorial_ts - 86400 * 3) | timestamp_custom('%m-%d', true) %}
{% set memorial_plus1 = (memorial_ts + 86400) | timestamp_custom('%m-%d', true) %}

{% set sep1_dow = strptime(year ~ '-09-01', '%Y-%m-%d').weekday() %}
{% set days_to_mon = (7 - sep1_dow) % 7 %}
{% set labor_ts = strptime(year ~ '-09-01', '%Y-%m-%d').timestamp() + (86400 * days_to_mon) %}
{% set labor_str = labor_ts | timestamp_custom('%m-%d', true) %}
{% set labor_minus3 = (labor_ts - 86400 * 3) | timestamp_custom('%m-%d', true) %}
{% set labor_plus1 = (labor_ts + 86400) | timestamp_custom('%m-%d', true) %}

{% if md >= tgiving_plus1 and md <= '12-31' %}
  xmas
{% elif md <= stock_show_end %}
  xmas
{% elif md == stock_show_plus1 %}
  default
{% elif md >= '10-10' and md <= '11-01' %}
  halloween
{% elif md == '11-02' %}
  default
{% elif md >= tgiving_minus7 and md <= tgiving_str %}
  thanks
{% elif md >= memorial_minus3 and md <= memorial_str %}
  rwb
{% elif md == memorial_plus1 %}
  default
{% elif md >= '06-28' and md <= '07-05' %}
  rwb
{% elif md == '07-06' %}
  default
{% elif md >= labor_minus3 and md <= labor_str %}
  rwb
{% elif md == labor_plus1 %}
  default
{% elif md >= '02-07' and md <= '02-14' %}
  valentines
{% elif md == '02-15' %}
  default
{% elif md >= '03-10' and md <= '03-17' %}
  stpats
{% elif md == '03-18' %}
  default
{% elif md >= easter_minus7 and md <= easter_str %}
  easter
{% elif md == easter_plus1 %}
  default
{% else %}
  idle
{% endif %}
