## =============================================================================
##  CORE SYSTEM CONFIGURATION
## =============================================================================
default_config:

homeassistant:
  external_url: "https://fleetmack.ddns.net"
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.1.0/24  
      allow_bypass_login: true
    - type: homeassistant

http:
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem  

# Load frontend themes
frontend:
  themes: !include_dir_merge_named themes

## =============================================================================
##  INTEGRATIONS & INCLUDES
## =============================================================================
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
browser_mod:
  prefix: "browser_"
  devices: {}

# Point the UI to the Add-on version of go2rtc
go2rtc:
  url: http://127.0.0.1:1984  

## =============================================================================
##  SENSORS & TEMPLATES
## =============================================================================
sensor:
  - platform: time_date
    display_options:
      - 'time'
      - 'date'

template:
  # Static / Calculation Sensors
  - sensor:
      - name: "Gas Flow Rate Corrected"
        unique_id: gas_flow_rate_corrected
        unit_of_measurement: "ft³/h"
        device_class: gas
        state_class: measurement
        state: "{{ states('sensor.house_gas_meter_gas_flow_rate') }}"

      - name: "Water Fixed Daily Cost"
        unique_id: water_fixed_daily_cost
        unit_of_measurement: "USD"
        state: "{{ (20.91 + 52.92) / 30 }}" # Fixed Monthly / Average Days per Denver Water bill

      - name: "Denver Water Current Price"
        unique_id: denver_water_current_price
        unit_of_measurement: "USD/gal"
        state: >
          {% set usage = states('sensor.denver_water_monthly') | float(0) %}
          {% if usage <= 5000 %}
            0.00302
          {% elif usage <= 20000 %}
            0.00544
          {% else %}
            0.00725
          {% endif %}

  # Trigger-based Weather Sensors
  - trigger:
      - platform: time_pattern
        hours: "/1"
      - platform: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: weather.forecast_home_2
        response_variable: daily_forecast
    sensor:
      - name: "Today Forecast High"
        unique_id: today_forecast_high
        state: "{{ daily_forecast['weather.forecast_home_2'].forecast[0].temperature }}"
        unit_of_measurement: "°F"
        icon: mdi:thermometer-high

## =============================================================================
##  UTILITY TRACKING & METERS
## =============================================================================
utility_meter:
  # Energy Metrics
  xcel_grid_import_monthly:
    source: sensor.xcel_itron_5_current_summation_delivered_value
    name: Xcel Grid Import (Monthly)
    cycle: monthly
    tariffs:
      - off_peak
      - on_peak
      
  xcel_grid_export_monthly:
    source: sensor.xcel_itron_5_current_summation_received_value
    name: Xcel Grid Export (Monthly)
    cycle: monthly
    tariffs:
      - off_peak
      - on_peak        

## =============================================================================
##  EXTERNAL ECOSYSTEMS
## =============================================================================
google_assistant:
  project_id: hassblinds-22558
  service_account: !include SERVICE_ACCOUNT.json
  report_state: true
  expose_by_default: false
  entity_config:
    cover.claire_blinds_homekit:
      expose: true
    cover.entry_blinds_homekit:
      expose: true
    cover.hudson_shades_all_homekit:
      expose: true
    cover.kitchen_shades_all_homekit:
      expose: true
    cover.living_room_shades_all_homekit:
      expose: true
    cover.master_shades_all_homekit:
      expose: true
    cover.office_shades_all_homekit:
      expose: true
    cover.piano_shades_all_homekit:
      expose: true
    cover.savannah_blinds_homekit:
      expose: true
