## =============================================================================
##  CORE SYSTEM CONFIGURATION
## =============================================================================
default_config:

homeassistant:
  external_url: "https://fleetmack.ddns.net"
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.1.0/24  
      allow_bypass_login: true
    - type: homeassistant

http:
  ssl_certificate: /ssl/fullchain.pem
  ssl_key: /ssl/privkey.pem  

# Load frontend themes
frontend:
  themes: !include_dir_merge_named themes

## =============================================================================
##  INTEGRATIONS & INCLUDES
## =============================================================================
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
browser_mod:
  prefix: "browser_"
  devices: {}

# Point the UI to the Add-on version of go2rtc
go2rtc:
  url: http://127.0.0.1:1984  

## =============================================================================
##  SENSORS & TEMPLATES
## =============================================================================
sensor:
  - platform: time_date
    display_options:
      - 'time'
      - 'date'

template:
  # Static / Calculation Sensors
  - sensor:
      - name: "Gas Flow Rate Corrected"
        unique_id: gas_flow_rate_corrected
        unit_of_measurement: "ft³/h"
        device_class: gas
        state_class: measurement
        state: "{{ states('sensor.house_gas_meter_gas_flow_rate') }}"

      - name: "Denver Water Current Price"
        unique_id: denver_water_current_price
        unit_of_measurement: "USD/gal"
        state: >
          {% set usage = states('sensor.monthly_water_total') | float(0) %}
          {% if usage <= 5000 %}
            0.00302
          {% elif usage <= 20000 %}
            0.00544
          {% else %}
            0.00725
          {% endif %}

      # for chip on custom energy dashboard
      - name: "Today Water Cost"
        unique_id: today_water_cost
        unit_of_measurement: "$"
        device_class: monetary
        state: >
          {% set vol = states('sensor.daily_water_total') | float(0) %}
          {% set price = states('sensor.denver_water_current_price') | float(0) %}
          {{ (vol * price) | round(2) }}          

      # Fixed Water Meter Fee ($20.91 / 32 days) [cite: 252, 233]
      - name: "Water Meter Fixed Daily"
        unique_id: water_meter_fixed_daily
        unit_of_measurement: "USD"
        state: "{{ (20.91 / 32) | round(4) }}"

      # Fixed Sewer Charge ($52.92 / 32 days) [cite: 258, 233]
      - name: "Sewer Fixed Daily"
        unique_id: sewer_fixed_daily
        unit_of_measurement: "USD"
        state: "{{ (52.92 / 32) | round(4) }}"

      # Sum of all non-usage utility fees (Electric, Gas, Water, Sewer)
      - name: "Total Utility Daily Fixed Costs"
        unique_id: total_utility_daily_fixed_costs
        unit_of_measurement: "USD"
        state: >
          {% set elec_fixed = 10.18 / 30 %}
          {% set gas_fixed = 11.83 / 30 %}
          {% set water_fixed = states('sensor.water_meter_fixed_daily') | float(0) %}
          {% set sewer_fixed = states('sensor.sewer_fixed_daily') | float(0) %}
          {{ (elec_fixed + gas_fixed + water_fixed + sewer_fixed) | round(2) }}

      # Calculation for the large "Total Utility Cost Today" chip
      - name: "Total Utility Cost Today"
        unique_id: total_utility_cost_today
        unit_of_measurement: "USD"
        state: >
          {% set elec = (states('sensor.daily_electric_import_off_peak_cost') | float(0)) + (states('sensor.daily_electric_import_on_peak_cost') | float(0)) %}
          {% set sold = (states('sensor.daily_solar_export_off_peak') | float(0)) + (states('sensor.daily_solar_export_on_peak') | float(0)) %}
          {% set gas = states('sensor.daily_gas_cost') | float(0) %}
          {% set water = states('sensor.today_water_cost') | float(0) %}
          {% set fixed = states('sensor.total_utility_daily_fixed_costs') | float(0) %}
          {{ (elec - sold + gas + water + fixed) | round(2) }}

  # Trigger-based Weather Sensors
  - trigger:
      - platform: time_pattern
        hours: "/1"
      - platform: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: weather.forecast_home_2
        response_variable: daily_forecast
    sensor:
      - name: "Today Forecast High"
        unique_id: today_forecast_high
        state: "{{ daily_forecast['weather.forecast_home_2'].forecast[0].temperature }}"
        unit_of_measurement: "°F"
        icon: mdi:thermometer-high

## =============================================================================
##  UTILITY TRACKING & METERS
## =============================================================================
utility_meter:
  # Energy Metrics
  xcel_grid_import_monthly:
    source: sensor.xcel_itron_5_current_summation_delivered_value
    name: Xcel Grid Import (Monthly)
    cycle: monthly
    tariffs:
      - off_peak
      - on_peak
      
  xcel_grid_export_monthly:
    source: sensor.xcel_itron_5_current_summation_received_value
    name: Xcel Grid Export (Monthly)
    cycle: monthly
    tariffs:
      - off_peak
      - on_peak        

  monthly_water_total:
    source: sensor.droplet_volume
    name: Monthly Water Total
    cycle: monthly
    offset:
      days: 12
    delta_values: true

  daily_water_total:
    source: sensor.droplet_volume
    name: Daily Water Total
    cycle: daily
    delta_values: true

