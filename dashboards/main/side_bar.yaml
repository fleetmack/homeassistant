type: vertical-stack
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        name: Kitchen
        icon: mdi:countertop
        tap_action:
          action: navigate
          navigation_path: /dashboard-playing/0#kitchen
        triggers_update: []
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return window.location.hash.replace('#','') ===
                variables.option ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return window.location.hash.replace('#','') ===
                variables.option ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return window.location.hash.replace('#','') ===
                variables.option ? '#4CAF50' : 'var(--paper-item-icon-color)'
                ]]]
        variables:
          option: kitchen
