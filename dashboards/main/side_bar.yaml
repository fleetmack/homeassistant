type: grid
view_layout:
  grid-area: sidebar
columns: 2
square: false
cards:
  - type: custom:button-card
    name: Kitchen
    icon: mdi:countertop
    entity: input_select.selected_room
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: input_select.selected_room
        option: kitchen
    styles:
      card:
        - height: 80px
        - border-radius: 12px
        - border: >-
            [[[ return states['input_select.selected_room'].state === 'kitchen'
            ? '2px solid #4CAF50' : '1px solid var(--divider-color)' ]]]
        - background-color: >-
            [[[ return states['input_select.selected_room'].state === 'kitchen'
            ? 'rgba(76, 175, 80, 0.1)' : 'var(--card-background-color)' ]]]
      icon:
        - color: >-
            [[[ return states['input_select.selected_room'].state === 'kitchen'
            ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
