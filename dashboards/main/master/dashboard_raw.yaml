              variables:
                path: climate
              tap_action:
                action: navigate
                navigation_path: /dashboard-twopointoh/climate
            - type: custom:button-card
              template: sidebar_nav
              name: Sonos
              icon: mdi:music
              variables:
                path: sonos
              tap_action:
                action: navigate
                navigation_path: /dashboard-twopointoh/sonos
            - type: custom:button-card
              template: sidebar_nav
              name: Energy
              icon: mdi:transmission-tower
              variables:
                path: energy
              tap_action:
                action: navigate
                navigation_path: /dashboard-twopointoh/energy
  global_calendar:
    card:
      type: vertical-stack
      cards:
        - type: energy-distribution
          link_dashboard: false
          card_mod:
            style: |
              ha-card { 
                background: var(--card-background-color, rgba(30, 30, 30, 0.9)) !important; 
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.1); 
                width: 166.6% !important; /* Draws it wide */
                transform: scale(0.60); /* Shrinks it back to exactly 100% width */
                transform-origin: top left; /* Pins it to the top left corner */
                margin-bottom: -150px !important; /* Pulls calendar up */
              }
        - type: custom:atomic-calendar-revive
          entities:
            - entity: calendar.fleetmack_gmail_com
              color: '#4285F4'
            - entity: calendar.family
              color: '#34A853'
          compactMode: true
          maxDaysToShow: 7
views:
  - title: Kitchen
    path: kitchen
    type: custom:grid-layout
    layout:
      grid-template-columns: 260px 1fr 300px
      grid-template-rows: auto 1fr
      grid-template-areas: |
        "header header header"
        "sidebar main calendar"
      grid-gap: 10px
    background:
      opacity: 50
      alignment: center
      size: cover
      repeat: repeat
      attachment: fixed
      image:
        media_content_id: media-source://image_upload/8d3c6f0e528ca139e833ce669b24cc9a
        media_content_type: image/jpeg
    cards:
      - type: custom:decluttering-card
        template: global_header
        view_layout:
          grid-area: header
      - type: custom:decluttering-card
        template: global_sidebar
        view_layout:
          grid-area: sidebar
      - type: custom:mod-card
        view_layout:
          grid-area: main
        card_mod:
          style: |
            ha-card { 
              background: rgba(30, 30, 30, 0.3) !important; /* Slightly darker to make the text pop */
              backdrop-filter: blur(12px); /* The frosted glass magic */
              -webkit-backdrop-filter: blur(12px);
              border-radius: 20px;
              border: 1px solid rgba(255, 255, 255, 0.15); 
              padding: 10px; 
            }
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-chips-card
              alignment: start
              card_mod:
                style: |
                  mushroom-chip { margin-right: 10px !important; }
              chips:
                - type: template
                  entity: climate.honeywell_t_stat_main_floor
                  icon: mdi:thermometer
                  icon_color: orange
                  content: 'Temp: {{ state_attr(entity, ''current_temperature'') }}°'
                - type: template
                  entity: binary_sensor.kitchen_motion_motion
                  icon: mdi:motion-sensor
                  icon_color: '{{ ''red'' if is_state(entity, ''on'') else ''grey'' }}'
                  content: >
                    {% set last =
                    states.binary_sensor.kitchen_motion_motion.last_changed %}  
                    Last Motion: {{ "Now" if is_state(entity, 'on') else
                    as_timestamp(last) | timestamp_custom('%-I:%M %p') }}
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.kitchen_cabinets
                  icon: mdi:led-strip-variant
                  name: Cabinets
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                - type: custom:stack-in-card
                  mode: horizontal
                  keep:
                    margin: false
                    box_shadow: false
                    outer_padding: false
                  cards:
                    - type: custom:mushroom-template-card
                      entity: light.kitchen_island_pendants
                      icon: mdi:ceiling-light-multiple
                      icon_color: '{{ ''amber'' if is_state(entity, ''on'') else ''grey'' }}'
                      layout: vertical
                      tap_action:
                        action: toggle
                      card_mod:
                        style: |
                          :host { flex: 0 0 30% !important; }
                          ha-card { 
                            border-right: 1px solid rgba(255,255,255,0.1) !important;
                            height: 106px !important;
                            background: none !important;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                          }
                    - type: custom:mushroom-template-card
                      entity: light.kitchen_pendants_2
                      primary: Island
                      secondary: Color Control
                      icon: mdi:palette
                      layout: vertical
                      tap_action:
                        action: more-info
                      card_mod:
                        style: |
                          :host { flex: 1 1 70% !important; }
                          ha-card { 
                            height: 106px !important;
                            background: none !important;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                          }
                  card_mod:
                    style: |
                      ha-card { 
                        border: 1px solid var(--divider-color) !important;
                        height: 106px !important;
                        background: rgba(255, 255, 255, 0.05) !important;
                      }
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.kitchen_table_chandelier
                  icon: mdi:chandelier
                  name: Chandelier
                - type: custom:mushroom-light-card
                  entity: light.kitchen_island_ceiling_lights
                  name: Island Ceiling
                - type: custom:mushroom-entity-card
                  entity: switch.pantry_and_cubbie
                  name: Pantry
                  icon: mdi:food
                  tap_action:
                    action: toggle
            - type: custom:mushroom-title-card
              title: Living & Entry
            - type: grid
              columns: 4
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.living_room_ceiling_lights
                  name: Living
                  icon: mdi:sofa
                - type: custom:mushroom-light-card
                  entity: light.piano_lights_lutron
                  name: Piano
                  icon: mdi:piano
                - type: custom:mushroom-light-card
                  entity: light.front_entry_lights
                  name: Entry
                - type: custom:mushroom-light-card
                  entity: light.upstairs_lights
                  name: Upstairs
            - type: custom:mini-media-player
              entity: media_player.living_room_sonos
              artwork: cover
              hide:
                power: true
                icon: false
              card_mod:
                style: |
                  ha-card {
                    background: rgba(0, 0, 0, 0.2); /* Slight tint so text stays legible when art isn't playing */
                  }
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-cover-card
                  entity: cover.living_room_shades_all_homekit
                  name: Living Shades
                  show_position_control: true
                  show_buttons_control: true
                - type: custom:mushroom-cover-card
                  entity: cover.kitchen_shades_all_homekit
                  name: Kitchen Shades
                  show_position_control: true
                  show_buttons_control: true
                - type: custom:mushroom-cover-card
                  entity: cover.piano_shades_all_homekit
                  name: Piano Shades
                  show_position_control: true
                  show_buttons_control: true
      - type: custom:decluttering-card
        template: global_calendar
        view_layout:
          grid-area: calendar
