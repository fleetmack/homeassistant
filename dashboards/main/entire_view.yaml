      - type: custom:mod-card
        view_layout:
          grid-area: main
        card_mod:
          style: |
            ha-card { 
              background: rgba(150, 150, 150, 0.05); 
              border-radius: 20px;
              border: 1px solid rgba(255, 255, 255, 0.1); 
              padding: 10px; 
            }
        card:
          type: custom:state-switch
          entity: hash
          default: kitchen
          states:
            kitchen:
              type: vertical-stack
              cards:
                - type: custom:mushroom-chips-card
                  alignment: start
                  card_mod:
                    style: |
                      mushroom-chip { margin-right: 10px !important; }
                  chips:
                    - type: template
                      entity: climate.honeywell_t_stat_main_floor
                      icon: mdi:thermometer
                      icon_color: orange
                      content: 'Temp: {{ state_attr(entity, ''current_temperature'') }}°'
                    - type: template
                      entity: binary_sensor.kitchen_motion_motion
                      icon: mdi:motion-sensor
                      icon_color: '{{ ''red'' if is_state(entity, ''on'') else ''grey'' }}'
                      content: >
                        {% set last =
                        states.binary_sensor.kitchen_motion_motion.last_changed
                        %}  Last Motion: {{ "Now" if is_state(entity, 'on') else
                        as_timestamp(last) | timestamp_custom('%-I:%M %p') }}
                - type: grid
                  columns: 2
                  square: false
                  cards:
                    - type: custom:mushroom-light-card
                      entity: light.kitchen_cabinets
                      name: Cabinets
                      use_light_color: true
                      show_brightness_control: true
                      show_color_control: true
                      show_color_temp_control: true
                      collapsible_controls: false
                    - type: custom:stack-in-card
                      mode: horizontal
                      keep:
                        margin: false
                        box_shadow: false
                        outer_padding: false
                      cards:
                        - type: custom:mushroom-template-card
                          entity: light.kitchen_island_pendants
                          icon: mdi:power
                          icon_color: '{{ ''amber'' if is_state(entity, ''on'') else ''grey'' }}'
                          layout: vertical
                          tap_action:
                            action: toggle
                          card_mod:
                            style: |
                              :host { flex: 0 0 30% !important; }
                              ha-card { 
                                border-right: 1px solid rgba(255,255,255,0.1) !important;
                                height: 106px !important;
                                background: none !important;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                              }
                        - type: custom:mushroom-template-card
                          entity: light.kitchen_pendants_2
                          primary: Island
                          secondary: Color Control
                          icon: mdi:palette
                          layout: vertical
                          tap_action:
                            action: more-info
                          card_mod:
                            style: |
                              :host { flex: 1 1 70% !important; }
                              ha-card { 
                                height: 106px !important;
                                background: none !important;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                              }
                      card_mod:
                        style: |
                          ha-card { 
                            border: 1px solid var(--divider-color) !important;
                            height: 106px !important;
                          }
                - type: grid
                  columns: 3
                  square: false
                  cards:
                    - type: custom:mushroom-light-card
                      entity: light.kitchen_table_chandelier
                      name: Chandelier
                    - type: custom:mushroom-light-card
                      entity: light.kitchen_island_ceiling_lights
                      name: Island Ceiling
