type: grid
view_layout:
  grid-area: header
columns: 4
square: false
cards:
  - type: custom:clock-weather-card
    entity: weather.forecast_home_2
    sun_entity: sun.sun
    scale: 0.5
    card_mod:
      style: |
        ha-card { height: 220px; }
  - type: custom:advanced-camera-card
    cameras:
      - camera_entity: camera.unifidoorbell_high_resolution_channel
    live:
      autoplay: true
    card_mod:
      style: |
        ha-card { height: 220px; }
  - type: vertical-stack
    cards:
      - type: custom:sonos-card
        sections:
          - player
        player:
          hideHeader: false
          artworkAsBackground: true
        card_mod:
          style: |
            ha-card { 
              height: 175px !important; 
              border-bottom-radius: 0px; 
            }
      - type: button
        name: Open Full Sonos Controller
        card_mod:
          style: |
            ha-card { 
              height: 45px !important; 
              border-top-radius: 0px; 
            }
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        color_type: blank-card
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            card_mod:
              style: |
                ha-card { height: 60px; border: none; background: transparent; }
                mushroom-chip { --chip-icon-size: 18px !important; }
            chips:
              - type: template
                icon: mdi:shield-check
                icon_color: >-
                  {{ 'green' if is_state('sensor.hub_hsm_status', 'disarmed')
                  else 'orange' }}
              - type: template
                icon: mdi:shield-home
                icon_color: orange
              - type: template
                icon: mdi:shield-lock
                icon_color: red
          - type: button
            entity: switch.vs_alarm_disarm_for_hass
            show_name: false
            show_icon: false
            card_mod:
              style: |
                ha-card {
                  height: 150px !important; 
                  background-image: url("/local/parrot.jpg");
                  background-size: cover;
                  background-position: center 15%;
                  border-radius: 12px;
                }
