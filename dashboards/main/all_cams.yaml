      title: Live Security Feeds
      style: >-
        --popup-max-width: 100vw; --popup-max-height: 100vh;
        --popup-background-color: black;
      content:
        type: grid
        columns: 3
        cards:
          - type: custom:webrtc-camera
            url: go2_doorbell_sub
            title: Doorbell
          - type: custom:webrtc-camera
            url: go2_frontporch_sub
            title: Front Porch
          - type: custom:webrtc-camera
            url: go2_package
            title: Package
          - type: custom:webrtc-camera
            url: go2_sideyard_sub
            title: Sideyard
          - type: custom:webrtc-camera
            url: go2_garage_sub
            title: Garage
          - type: custom:webrtc-camera
            url: go2_alleydown_sub
            title: Alleydown
          - type: custom:webrtc-camera
            url: go2_alleysouth_sub
