type: custom:grid-layout
path: ""
layout:
  grid-template-columns: 260px 1fr 300px
  grid-template-rows: auto 1fr
  grid-template-areas: |
    "header header header"
    "sidebar main calendar"
  grid-gap: 10px
cards:
  - type: grid
    view_layout:
      grid-area: header
    columns: 4
    square: false
    cards:
      - type: custom:clock-weather-card
        entity: weather.forecast_home_2
        sun_entity: sun.sun
        forecast_rows: 3
        scale: 0.5
        card_mod:
          style: "ha-card { height: 220px; }"
      - type: custom:advanced-camera-card
        cameras:
          - camera_entity: camera.unifidoorbell_high_resolution_channel
        live:
          autoplay: true
        card_mod:
          style: "ha-card { height: 220px; }"
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            subtitle: Security Alerts
          - type: markdown
            content: >
              **Active Issues:** Open gates, unlocked doors, or AC running with
              windows open will appear here.
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            color_type: blank-card
          - type: vertical-stack
            cards:
              - type: custom:mushroom-chips-card
                alignment: center
                card_mod:
                  style: >
                    ha-card { height: 60px; border: none; background:
                    transparent; }

                    mushroom-chip { --chip-icon-size: 18px !important; }
                chips:
                  - type: template
                    icon: mdi:shield-check
                    icon_color: >-
                      {{ 'green' if is_state('sensor.hub_hsm_status',
                      'disarmed') else 'orange' }}
                  - type: template
                    icon: mdi:shield-home
                    icon_color: orange
                  - type: template
                    icon: mdi:shield-lock
                    icon_color: red
              - type: button
                entity: switch.vs_alarm_disarm_for_hass
                show_name: false
                show_icon: false
                card_mod:
                  style: |
                    ha-card {
                      height: 150px !important; 
                      background-image: url("/local/parrot.jpg");
                      background-size: cover;
                      background-position: center 15%;
                      border-radius: 12px;
                    }
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        name: Kitchen
        icon: mdi:countertop
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: kitchen
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'kitchen' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'kitchen' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'kitchen' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Office
        icon: mdi:desk
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: office
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'office' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'office' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'office' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Master
        icon: mdi:bed
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: master
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'master' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'master' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'master' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Backyard
        icon: mdi:grill
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: backyard
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'backyard' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'backyard' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'backyard' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Cameras
        icon: mdi:video
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: cameras
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'cameras' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'cameras' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'cameras' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Sensors
        icon: mdi:list-status
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: sensors
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'sensors' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'sensors' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'sensors' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Garage
        icon: mdi:garage
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: garage
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'garage' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'garage' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'garage' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
      - type: custom:button-card
        name: Basement
        icon: mdi:basketball
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: basement
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'basement' ? '2px solid #4CAF50' : '1px solid
                var(--divider-color)' ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'basement' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'basement' ? '#4CAF50' : 'var(--paper-item-icon-color)'
                ]]]            
      - type: custom:button-card
        name: Sonos
        icon: mdi:music
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: sonos
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
                [[[ return states['input_select.selected_room'].state ===
                'sonos' ? '2px solid #4CAF50' : '1px solid var(--divider-color)'
                ]]]
            - background-color: >-
                [[[ return states['input_select.selected_room'].state ===
                'sonos' ? 'rgba(76, 175, 80, 0.1)' :
                'var(--card-background-color)' ]]]
          icon:
            - color: >-
                [[[ return states['input_select.selected_room'].state ===
                'sonos' ? '#4CAF50' : 'var(--paper-item-icon-color)' ]]]
    view_layout:
      grid-area: sidebar
  - type: custom:mod-card
    view_layout:
      grid-area: main
    card_mod:
      style: |
        ha-card { background: rgba(150, 150, 150, 0.05); border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px; }
    card:
      type: custom:state-switch
      entity: input_select.selected_room
      default: kitchen
      states:
        kitchen:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Kitchen Area
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.kitchen_cabinets
                  name: Kitchen Cabinets
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                - type: custom:mushroom-light-card
                  entity: light.kitchen_pendants_2
                  name: Island Pendants
                  icon: mdi:lightbulb-group
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: light.toggle
                    data:
                      entity_id: light.kitchen_island_pendants
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.kitchen_table_chandelier
                  name: Chandelier
                - type: custom:mushroom-light-card
                  entity: light.kitchen_island_ceiling_lights
                  name: Island Ceiling
                - type: custom:mushroom-entity-card
                  entity: switch.pantry_and_cubbie
                  name: Pantry
                  icon: mdi:door-open
                  tap_action:
                    action: toggle
            - type: custom:mushroom-title-card
              title: Living & Entry
            - type: grid
              columns: 4
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.living_room_ceiling_lights
                  name: Living
                  icon: mdi:sofa
                - type: custom:mushroom-light-card
                  entity: light.piano_lights_lutron
                  name: Piano
                  icon: mdi:piano
                - type: custom:mushroom-light-card
                  entity: light.front_entry_lights
                  name: Entry
                - type: custom:mushroom-light-card
                  entity: light.upstairs_lights
                  name: Upstairs
            - type: custom:mini-media-player
              entity: media_player.living_room_sonos
              artwork: material
              hide:
                power: true
                icon: false
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-cover-card
                  entity: cover.living_room_shades_12
                  name: Living Shades
                  show_position_control: true
                - type: custom:mushroom-cover-card
                  entity: cover.kitchen_shades_21
                  name: Kitchen Shades
                  show_position_control: true
                - type: custom:mushroom-cover-card
                  entity: cover.piano_shades_17
                  name: Piano Shades
                  show_position_control: true
        office:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Home Office
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.office_overhead_bulbs
                  name: Overhead
                  icon: mdi:lightbulb-group
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: light.toggle
                    target:
                      entity_id: light.office_lights
                - type: custom:mushroom-light-card
                  entity: light.hue_office_monitors_lights
                  name: Monitors
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
            - type: custom:mushroom-cover-card
              entity: cover.office_shades_7
              name: Office Shades
              show_position_control: true
              show_buttons_control: true
              show_tilt_control: true
              tap_action:
                action: more-info
              hold_action:
                action: toggle
            - type: custom:mini-media-player
              entity: media_player.den_2
              artwork: material
        master:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Master Bedroom
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-entity-card
                  entity: light.master_bedroom_entry_lights
                  name: Entry Lights
                  icon: mdi:door-open
                  tap_action:
                    action: toggle
                - type: custom:mushroom-entity-card
                  entity: light.master_bedroom_main_lights
                  name: Main Lights
                  tap_action:
                    action: toggle
                - type: custom:mushroom-entity-card
                  entity: switch.master_fan_2
                  name: Fan
                  icon: mdi:fan
                  tap_action:
                    action: toggle
            - type: custom:mushroom-cover-card
              entity: cover.master_shades_42
              name: Master Shades
              show_position_control: true
            - type: custom:mini-media-player
              entity: media_player.bedroom_playbar_sonos
              artwork: material
        backyard:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Backyard & Alley
            - type: custom:mushroom-chips-card
              alignment: justify
              chips:
                - type: template
                  icon: mdi:thermometer
                  content: >-
                    Outside: {{ states('sensor.outside_temperature_temperature')
                    }}°
                  icon_color: orange
                - type: template
                  entity: binary_sensor.gate_alley_yard_lr_contact
                  icon: >-
                    {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                    }}
                  content: Yard
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: template
                  entity: binary_sensor.gate_trash_lr_contact
                  icon: >-
                    {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                    }}
                  content: Trash
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: template
                  entity: binary_sensor.gate_front_yard_lr_contact
                  icon: >-
                    {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                    }}
                  content: Front
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: entity
                  entity: lock.reliable_garage_yard_lock
                  name: Garage
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.alley_and_backyard_sconce_lights
                  name: Garage/Alley
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: light.toggle
                    data:
                      entity_id: light.backyard_garage_lights_lr
                - type: custom:mushroom-light-card
                  entity: light.fence_lights
                  name: Fence
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  collapsible_controls: false
                  tap_action:
                    action: toggle
                  hold_action:
                    action: call-service
                    service: light.turn_on
                    data:
                      rgb_color:
                        - 255
                        - 255
                        - 255
                    target:
                      entity_id: light.fence_lights
                - type: custom:mushroom-light-card
                  entity: light.pergola_lights_new
                  name: Pergola
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  collapsible_controls: false
                  tap_action:
                    action: toggle
                  hold_action:
                    action: call-service
                    service: light.turn_on
                    data:
                      rgb_color:
                        - 255
                        - 255
                        - 255
                    target:
                      entity_id: light.pergola_lights_new
                - type: custom:mushroom-light-card
                  entity: light.playset_lights
                  name: Playset
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  collapsible_controls: false
                  tap_action:
                    action: toggle
                  hold_action:
                    action: call-service
                    service: light.turn_on
                    data:
                      rgb_color:
                        - 255
                        - 255
                        - 255
                    target:
                      entity_id: light.playset_lights
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-entity-card
                  entity: switch.patio_fans
                  name: Patio Fans
                  icon: mdi:fan
                  tap_action:
                    action: toggle
                - type: custom:mushroom-entity-card
                  entity: switch.backyard_fountain
                  name: Fountain
                  icon: mdi:fountain
                  tap_action:
                    action: toggle
            - type: custom:mini-media-player
              entity: media_player.yard_grill_sonos
              name: Grill Sonos
              artwork: material
              hide:
                power: true
            - type: custom:mini-media-player
              entity: media_player.yard_fire_pit_sonos
              name: Fire Pit Sonos
              artwork: material
              hide:
                power: true
            - type: custom:mini-media-player
              entity: media_player.yard_playground_sonos
              name: Playground Sonos
              artwork: material
              hide:
                power: true
        garage:
          type: vertical-stack
          cards:
            - type: custom:mushroom-chips-card
              alignment: justify
              chips:
                - type: template
                  entity: binary_sensor.garage_door_opener_contact
                  icon: mdi:garage
                  content: "Garage: {{ 'Open' if is_state(entity, 'on') else 'Closed' }}"
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: entity
                  entity: sensor.garage_temp_sensor_temperature
                  icon_color: blue
                - type: template
                  icon: mdi:fridge-outline
                  content: "Keezer: {{ states('sensor.keezer_temp_lr_temperature') }}°"
                  icon_color: >-
                    {{ 'red' if states('sensor.keezer_temp_lr_temperature') |
                    float > 40 else 'blue' }}
                - type: template
                  icon: mdi:fridge-bottom
                  content: >-
                    Freezer: {{ states('sensor.chest_freezer_temp_temperature')
                    }}°
                  icon_color: >-
                    {{ 'red' if states('sensor.chest_freezer_temp_temperature')
                    | float > 10 else 'blue' }}
            - type: grid
              columns: 2
              square: false
              cards:
                - type: picture-entity
                  entity: camera.go2_garage_sub
                  camera_view: live
                  show_name: false
                  show_state: false
                  card_mod:
                    style: |
                      ha-card { height: 120px !important; overflow: hidden; } 
                      img { object-fit: cover; height: 100%; }
                - type: vertical-stack
                  cards:
                    - type: custom:mushroom-light-card
                      entity: light.garage_lights
                      show_brightness_control: true
                      use_light_color: true
                    - type: grid
                      columns: 2
                      square: false
                      cards:
                        - type: custom:mushroom-lock-card
                          entity: lock.garage_house_lock
                          name: House
                        - type: custom:mushroom-lock-card
                          entity: lock.reliable_garage_yard_lock
                          name: Yard
            - type: custom:mushroom-title-card
              subtitle: Audio
            - type: custom:mini-media-player
              entity: media_player.garage_sonos_play1_tools
              name: Sonos Tools
              artwork: material
            - type: custom:mini-media-player
              entity: media_player.newly
              name: Sonos Door
              artwork: material
        basement:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Basement Area
            - type: custom:mushroom-chips-card
              alignment: justify
              chips:
                - type: template
                  icon: mdi:fridge-bottom
                  content: >-
                    Freezer: {{ states('sensor.basement_freezer_lr_temperature')
                    }}°
                  icon_color: >-
                    {{ 'red' if states('sensor.basement_freezer_lr_temperature')
                    | float > 10 else 'blue' }}
                - type: template
                  icon: mdi:fridge-outline
                  content: >-
                    Fridge: {{
                    states('sensor.basement_fridge_temp_sensor_temperature') }}°
                  icon_color: >-
                    {{ 'red' if
                    states('sensor.basement_fridge_temp_sensor_temperature') |
                    float > 40 else 'blue' }}
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.basement_lounge_ceiling_lights
                  name: Lounge Ceiling
                  use_light_color: true
                  show_brightness_control: true
                  show_color_temp_control: true
                  show_color_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: switch.toggle
                    target:
                      entity_id: switch.basement_lounge_switches
                - type: custom:mushroom-light-card
                  entity: light.basement_bar_lights
                  name: Bar Fun
                  use_light_color: true
                  show_brightness_control: true
                  show_color_temp_control: true
                  show_color_control: true
                  collapsible_controls: false
                - type: custom:mushroom-light-card
                  entity: light.basement_playroom_lights_2
                  name: Playroom
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: switch.toggle
                    target:
                      entity_id: switch.basement_play_area_switches
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-entity-card
                  entity: switch.basement_storage_switch
                  name: Storage
                  icon: mdi:lightbulb-outline
                  tap_action:
                    action: toggle
