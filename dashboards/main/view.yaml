  - type: custom:mod-card
    view_layout:
      grid-area: main
    card_mod:
      style: |
        ha-card { 
          background: rgba(150, 150, 150, 0.05); 
          border-radius: 20px;
          border: 1px solid rgba(255, 255, 255, 0.1); 
          padding: 10px; 
        }
    card:
      type: custom:state-switch
      entity: input_select.selected_room
      default: kitchen
      states:
        kitchen:
          type: vertical-stack
          cards:
            - type: custom:mushroom-chips-card
              alignment: start
              card_mod:
                style: |
                  mushroom-chip { margin-right: 10px !important; }
              chips:
                - type: template
                  entity: climate.honeywell_t_stat_main_floor
                  icon: mdi:thermometer
                  icon_color: orange
                  content: "Temp: {{ state_attr(entity, 'current_temperature') }}°"
                - type: template
                  entity: binary_sensor.kitchen_motion_motion
                  icon: mdi:motion-sensor
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'grey' }}"
                  content: >
                    {% set last =
                    states.binary_sensor.kitchen_motion_motion.last_changed %}
                    Last Motion: {{ "Now" if is_state(entity, 'on') else
                    as_timestamp(last) | timestamp_custom('%-I:%M %p') }}
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.kitchen_cabinets
                  name: Kitchen Cabinets
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                - type: custom:mushroom-light-card
                  entity: light.kitchen_pendants_2
                  name: Island Pendants
                  icon: mdi:lightbulb-group
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: light.toggle
                    data:
                      entity_id: light.kitchen_island_pendants
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.kitchen_table_chandelier
                  name: Chandelier
                - type: custom:mushroom-light-card
                  entity: light.kitchen_island_ceiling_lights
                  name: Island Ceiling
                - type: custom:mushroom-entity-card
                  entity: switch.pantry_and_cubbie
                  name: Pantry
                  icon: mdi:door-open
                  tap_action:
                    action: toggle
            - type: custom:mushroom-title-card
              title: Living & Entry
            - type: grid
              columns: 4
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.living_room_ceiling_lights
                  name: Living
                  icon: mdi:sofa
                - type: custom:mushroom-light-card
                  entity: light.piano_lights_lutron
                  name: Piano
                  icon: mdi:piano
                - type: custom:mushroom-light-card
                  entity: light.front_entry_lights
                  name: Entry
                - type: custom:mushroom-light-card
                  entity: light.upstairs_lights
                  name: Upstairs
            - type: custom:mini-media-player
              entity: media_player.living_room_sonos
              artwork: material
              hide:
                power: true
                icon: false
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-cover-card
                  entity: cover.living_room_shades_12
                  name: Living Shades
                  show_position_control: true
                - type: custom:mushroom-cover-card
                  entity: cover.kitchen_shades_21
                  name: Kitchen Shades
                  show_position_control: true
                - type: custom:mushroom-cover-card
                  entity: cover.piano_shades_17
                  name: Piano Shades
                  show_position_control: true
        office:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Home Office
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.office_overhead_bulbs
                  name: Overhead
                  icon: mdi:lightbulb-group
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
                  tap_action:
                    action: call-service
                    service: light.toggle
                    target:
                      entity_id: light.office_lights
                - type: custom:mushroom-light-card
                  entity: light.hue_office_monitors_lights
                  name: Monitors
                  use_light_color: true
                  show_brightness_control: true
                  show_color_control: true
                  show_color_temp_control: true
                  collapsible_controls: false
            - type: custom:mushroom-cover-card
              entity: cover.office_shades_7
              name: Office Shades
              show_position_control: true
              show_buttons_control: true
              show_tilt_control: true
              tap_action:
                action: more-info
              hold_action:
                action: toggle
            - type: custom:mini-media-player
              entity: media_player.den_2
              artwork: material
        master:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Master Bedroom
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-entity-card
                  entity: light.master_bedroom_entry_lights
                  name: Entry Lights
                  icon: mdi:door-open
                  tap_action:
                    action: toggle
                - type: custom:mushroom-entity-card
                  entity: light.master_bedroom_main_lights
                  name: Main Lights
                  tap_action:
                    action: toggle
                - type: custom:mushroom-entity-card
                  entity: switch.master_fan_2
                  name: Fan
                  icon: mdi:fan
                  tap_action:
                    action: toggle
            - type: custom:mushroom-cover-card
              entity: cover.master_shades_42
              name: Master Shades
              show_position_control: true
            - type: custom:mini-media-player
              entity: media_player.bedroom_playbar_sonos
              artwork: material
        backyard:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: Backyard & Alley
            - type: custom:mushroom-chips-card
              alignment: justify
              chips:
                - type: template
                  icon: mdi:thermometer
                  content: >-
                    Outside: {{ states('sensor.outside_temperature_temperature')
                    }}°
                  icon_color: orange
                - type: template
                  entity: binary_sensor.gate_alley_yard_lr_contact
                  icon: >-
                    {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                    }}
                  content: Yard
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: template
                  entity: binary_sensor.gate_trash_lr_contact
                  icon: >-
                    {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                    }}
                  content: Trash
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: template
                  entity: binary_sensor.gate_front_yard_lr_contact
                  icon: >-
                    {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                    }}
                  content: Front
                  icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                - type: entity
                  entity: lock.reliable_garage_yard_lock
                  name: Garage
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-light-card
                  entity: light.alley_and_backyard_sconce_lights
