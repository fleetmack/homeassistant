type: custom:grid-layout
path: ""
layout:
  grid-template-columns: 260px 1fr 300px
  grid-template-rows: auto 1fr
  grid-template-areas: |
    "header header header"
    "sidebar main calendar"
  grid-gap: 10px
cards:
  - type: grid
    view_layout:
      grid-area: header
    columns: 4
    square: false
    cards:
      - type: custom:clock-weather-card
        entity: weather.forecast_home_2
        sun_entity: sun.sun
        forecast_rows: 3
        scale: 0.5
        card_mod:
          style: "ha-card { height: 220px; }"
      - type: custom:advanced-camera-card
        cameras:
          - camera_entity: camera.unifidoorbell_high_resolution_channel
        live:
          autoplay: true
        card_mod:
          style: "ha-card { height: 220px; }"
      - type: markdown
        card_mod:
          style: |
            ha-card { 
              background: transparent !important; 
              border: none !important;
              height: 180px;
              overflow-y: auto;
              padding-top: 0px;
            }
        content: "{{ states('sensor.attention_required_list') }}"
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            color_type: blank-card
          - type: vertical-stack
            cards:
              - type: custom:mushroom-chips-card
                alignment: center
                card_mod:
                  style: |
                    ha-card { 
                      height: 50px; 
                      border: none; 
                      background: transparent; 
                    }
                chips:
                  - type: template
                    entity: sensor.virtual_hsm_status_mirror_hsm_status
                    icon: >
                      {% if is_state(entity, 'disarmed') %} mdi:shield-check {%
                      elif is_state(entity, 'armedHome') %} mdi:shield-home {%
                      else %} mdi:shield-lock {% endif %}
                    icon_color: >
                      {% if is_state(entity, 'disarmed') %} green {% else %}
                      orange {% endif %}
                    content: "Status: {{ states(entity) | capitalize }}"
              - type: button
                entity: switch.vs_alarm_disarm_for_hass
                show_name: false
                show_icon: false
                card_mod:
                  style: |
                    ha-card {
                      height: 150px !important; 
                      background-image: url("/local/parrot.jpg");
                      background-size: cover;
                      background-position: center 15%;
                      border-radius: 12px;
                      margin-bottom: 10px;
                    }
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-template-card
                    entity: switch.vs_alarm_home_for_hass
                    icon: mdi:bed
                    icon_color: blue
                    layout: horizontal
                    tap_action:
                      action: toggle
                    card_mod:
                      style: >
                        ha-card { background: rgba(255, 255, 255, 0.05);
                        border-radius: 12px; }
                  - type: custom:mushroom-template-card
                    entity: switch.vs_alarm_away_for_hass
                    icon: mdi:shield-airplane
                    icon_color: red
                    layout: horizontal
                    tap_action:
                      action: toggle
                    card_mod:
                      style: >
                        ha-card { background: rgba(255, 255, 255, 0.05);
                        border-radius: 12px; }
  - type: grid
    view_layout:
      grid-area: sidebar
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        name: Kitchen
        icon: mdi:countertop
        entity: input_select.selected_room
        tap_action:
          action: call-service
          service: input_select.select_option
          service_data:
            entity_id: input_select.selected_room
            option: kitchen
        styles:
          card:
            - height: 80px
            - border-radius: 12px
            - border: >-
