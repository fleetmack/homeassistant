type: custom:layout-card
layout_type: custom:grid-layout
view_layout:
  grid-area: header
layout:
  grid-template-columns: 20% 20% 40% 20%
  grid-template-rows: auto
  margin: 0px
  padding: 0px
cards:
  # COLUMN 1: Weather (20%)
  - type: custom:clock-weather-card
    entity: weather.forecast_home_2
    sun_entity: sun.sun
    forecast_rows: 3
    scale: 0.4
    card_mod:
      style: "ha-card { height: 220px; border: none; background: transparent; }"

  # COLUMN 2: Doorbell Camera (20%)
  - type: custom:advanced-camera-card
    cameras:
      - camera_entity: camera.unifidoorbell_high_resolution_channel
    live:
      autoplay: true
    card_mod:
      style: "ha-card { height: 220px; border-radius: 12px; }"

  # COLUMN 3: MISSION CONTROL SENSORS (40%)
  - type: vertical-stack
    cards:
      # ROW 1: GATES
      - type: custom:mushroom-chips-card
        alignment: left
        card_mod:
          style: |
            ha-card { --chip-spacing: 4px; border: none; background: transparent; }
            .chip-container mushroom-template-chip:nth-child(1) { 
              --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
            }
        chips:
          - type: template
            content: "Gates:"
          - type: template
            entity: binary_sensor.gate_alley_yard_lr_contact
            icon: "{{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Alley
          - type: template
            entity: binary_sensor.gate_front_yard_lr_contact
            icon: "{{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Yard
          - type: template
            entity: binary_sensor.gate_trash_lr_contact
            icon: "{{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Trash

      # ROW 2: LOCKS
      - type: custom:mushroom-chips-card
        alignment: left
        card_mod:
          style: |
            ha-card { --chip-spacing: 4px; border: none; background: transparent; }
            .chip-container mushroom-template-chip:nth-child(1) { 
              --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
            }
        chips:
          - type: template
            icon: mdi:lock
          - type: template
            entity: lock.front_door_lock
            icon: "{{ 'mdi:lock-open' if is_state(entity, 'unlocked') else 'mdi:lock' }}"
            icon_color: "{{ 'red' if is_state(entity, 'unlocked') else 'green' }}"
            content: Front
          - type: template
            entity: lock.garage_house_lock
            icon: "{{ 'mdi:lock-open' if is_state(entity, 'unlocked') else 'mdi:lock' }}"
            icon_color: "{{ 'red' if is_state(entity, 'unlocked') else 'green' }}"
            content: Mud
          - type: template
            entity: lock.garage_yard_lock
            icon: "{{ 'mdi:lock-open' if is_state(entity, 'unlocked') else 'mdi:lock' }}"
            icon_color: "{{ 'red' if is_state(entity, 'unlocked') else 'green' }}"
            content: Yard
          - type: template
            entity: binary_sensor.kitchen_sliding_door_lock_lr_contact
            icon: "{{ 'mdi:lock-open' if is_state(entity, 'on') else 'mdi:lock' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Slider

      # ROW 3: DOORS
      - type: custom:mushroom-chips-card
        alignment: left
        card_mod:
          style: |
            ha-card { --chip-spacing: 4px; border: none; background: transparent; }
            .chip-container mushroom-template-chip:nth-child(1) { 
              --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
            }
        chips:
          - type: template
            icon: mdi:door-closed
          - type: template
            entity: binary_sensor.front_door_sensor_contact
            icon: "{{ 'mdi:door-open' if is_state(entity, 'on') else 'mdi:door-closed' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Front
          - type: template
            entity: binary_sensor.garage_house_door_sensor_contact
            icon: "{{ 'mdi:door-open' if is_state(entity, 'on') else 'mdi:door-closed' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Mud
          - type: template
            entity: binary_sensor.garage_yard_door_sensor_contact
            icon: "{{ 'mdi:door-open' if is_state(entity, 'on') else 'mdi:door-closed' }}"
            icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
            content: Yard
          - type: template
            entity: cover.garage_door_opener_door
            icon: "{{ 'mdi:garage-open' if is_state(entity, 'open') else 'mdi:garage' }}"
            icon_color: "{{ 'red' if is_state(entity, 'open') else 'green' }}"
            content: Car

      # ROW 4: FRIDGES
      - type: custom:mushroom-chips-card
        alignment: left
        card_mod:
          style: |
            ha-card { --chip-spacing: 4px; border: none; background: transparent; }
            .chip-container mushroom-template-chip:nth-child(1) { 
              --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
            }
        chips:
          - type: template
            icon: mdi:fridge
          - type: template
            entity: sensor.keezer_temp_lr_temperature
            icon: mdi:beer
            icon_color: "{{ 'blue' if states(entity)|float < 42 else 'red' }}"
            content: "Beer {{ states(entity) }}°"
          - type: template
            entity: sensor.basement_fridge_temp_sensor_temperature
            icon: mdi:fridge-bottom
            icon_color: "{{ 'blue' if states(entity)|float < 40 else 'red' }}"
            content: "Bsmt {{ states(entity) }}°"
          - type: template
            entity: sensor.kitchen_fridge_temp_sensor_temperature
            icon: mdi:fridge-outline
            icon_color: "{{ 'blue' if states(entity)|float < 40 else 'red' }}"
            content: "Kitch {{ states(entity) }}°"

      # ROW 5: FREEZERS
      - type: custom:mushroom-chips-card
        alignment: left
        card_mod:
          style: |
            ha-card { --chip-spacing: 4px; border: none; background: transparent; }
            .chip-container mushroom-template-chip:nth-child(1) { 
              --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
            }
        chips:
          - type: template
            icon: mdi:snowflake
          - type: template
            entity: sensor.chest_freezer_temp_temperature
            icon: mdi:snowflake
            icon_color: "{{ 'blue' if states(entity)|float < 15 else 'red' }}"
            content: "Chest {{ states(entity) }}°"
          - type: template
            entity: sensor.kitchen_freezer_lr_temperature
            icon: mdi:snowflake
            icon_color: "{{ 'blue' if states(entity)|float < 15 else 'red' }}"
            content: "Kitch {{ states(entity) }}°"
          - type: template
            entity: sensor.basement_freezer_lr_temperature
            icon: mdi:snowflake
            icon_color: "{{ 'blue' if states(entity)|float < 15 else 'red' }}"
            content: "Bsmt {{ states(entity) }}°"

  # COLUMN 4: ALARM (20%)
  - type: vertical-stack
    cards:
      - type: custom:mushroom-chips-card
        alignment: center
        card_mod:
          style: "ha-card { height: 40px; border: none; background: transparent; }"
        chips:
          - type: template
            entity: sensor.virtual_hsm_status_mirror_hsm_status
            icon: >
              {% if is_state(entity, 'disarmed') %} mdi:shield-check {% elif
              is_state(entity, 'armedHome') %} mdi:shield-home {% else %}
              mdi:shield-lock {% endif %}
            icon_color: "{{ 'green' if is_state(entity, 'disarmed') else 'orange' }}"
            content: "Status: {{ states(entity) | capitalize }}"
      - type: button
        entity: switch.vs_alarm_disarm_for_hass
        show_name: false
        show_icon: false
        card_mod:
          style: |
            ha-card {
              height: 120px !important; 
              background-image: url("/local/parrot.jpg");
              background-size: cover;
              background-position: center 15%;
              border-radius: 12px;
            }
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: switch.vs_alarm_home_for_hass
            primary: "Home"
            icon: mdi:bed
            icon_color: blue
            layout: horizontal
            tap_action:
              action: toggle
          - type: custom:mushroom-template-card
            entity: switch.vs_alarm_away_for_hass
            primary: "Away"
            icon: mdi:shield-airplane
            icon_color: red
            layout: horizontal
            tap_action:
              action: toggle
