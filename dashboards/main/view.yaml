type: custom:grid-layout
path: ""
layout:
  grid-template-columns: 260px 1fr 300px
  grid-template-rows: auto 1fr
  grid-template-areas: |
    "header header header"
    "sidebar main calendar"
  grid-gap: 10px
cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    view_layout:
      grid-area: header
    layout:
      grid-template-columns: 20% 20% 40% 20%
      grid-template-rows: auto
      margin: 0px
      padding: 0px
    cards:
      - type: custom:clock-weather-card
        entity: weather.forecast_home_2
        sun_entity: sun.sun
        forecast_rows: 3
        scale: 0.4
        card_mod:
          style: "ha-card { height: 220px; border: none; background: transparent; }"
      - type: custom:advanced-camera-card
        cameras:
          - camera_entity: camera.unifidoorbell_high_resolution_channel
        live:
          autoplay: true
        card_mod:
          style: "ha-card { height: 220px; border-radius: 12px; }"
      - type: vertical-stack
        cards:
          - type: custom:mushroom-chips-card
            alignment: left
            card_mod:
              style: >
                ha-card { --chip-spacing: 4px; border: none; background:
                transparent; }

                .chip-container mushroom-template-chip:nth-child(1) { 
                  --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
                }
            chips:
              - type: template
                content: "Gates:"
              - type: template
                entity: binary_sensor.gate_alley_yard_lr_contact
                icon: >-
                  {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                  }}
                icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                content: Alley
              - type: template
                entity: binary_sensor.gate_front_yard_lr_contact
                icon: >-
                  {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                  }}
                icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                content: Yard
              - type: template
                entity: binary_sensor.gate_trash_lr_contact
                icon: >-
                  {{ 'mdi:gate-open' if is_state(entity, 'on') else 'mdi:gate'
                  }}
                icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                content: Trash
          - type: custom:mushroom-chips-card
            alignment: left
            card_mod:
              style: >
                ha-card { --chip-spacing: 4px; border: none; background:
                transparent; }

                .chip-container mushroom-template-chip:nth-child(1) { 
                  --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
                }
            chips:
              - type: template
                icon: mdi:lock
              - type: template
                entity: lock.front_door_lock
                icon: >-
                  {{ 'mdi:lock-open' if is_state(entity, 'unlocked') else
                  'mdi:lock' }}
                icon_color: "{{ 'red' if is_state(entity, 'unlocked') else 'green' }}"
                content: Front
              - type: template
                entity: lock.garage_house_lock
                icon: >-
                  {{ 'mdi:lock-open' if is_state(entity, 'unlocked') else
                  'mdi:lock' }}
                icon_color: "{{ 'red' if is_state(entity, 'unlocked') else 'green' }}"
                content: Mud
              - type: template
                entity: lock.garage_yard_lock
                icon: >-
                  {{ 'mdi:lock-open' if is_state(entity, 'unlocked') else
                  'mdi:lock' }}
                icon_color: "{{ 'red' if is_state(entity, 'unlocked') else 'green' }}"
                content: Yard
              - type: template
                entity: binary_sensor.kitchen_sliding_door_lock_lr_contact
                icon: >-
                  {{ 'mdi:lock-open' if is_state(entity, 'on') else 'mdi:lock'
                  }}
                icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                content: Slider
          - type: custom:mushroom-chips-card
            alignment: left
            card_mod:
              style: >
                ha-card { --chip-spacing: 4px; border: none; background:
                transparent; }

                .chip-container mushroom-template-chip:nth-child(1) { 
                  --chip-background: none; --chip-box-shadow: none; --chip-font-weight: bold;
                }
            chips:
              - type: template
                icon: mdi:door-closed
              - type: template
                entity: binary_sensor.front_door_sensor_contact
                icon: >-
                  {{ 'mdi:door-open' if is_state(entity, 'on') else
                  'mdi:door-closed' }}
                icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                content: Front
              - type: template
                entity: binary_sensor.garage_house_door_sensor_contact
                icon: >-
                  {{ 'mdi:door-open' if is_state(entity, 'on') else
                  'mdi:door-closed' }}
                icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
                content: Mud
              - type: template
                entity: binary_sensor.garage_yard_door_sensor_contact
                icon: >-
