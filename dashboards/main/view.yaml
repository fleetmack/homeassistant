        sensors:
          type: grid
          columns: 3
          square: false
          cards:
            - type: custom:config-template-card
              entities:
                - sensor.outside_temperature_temperature
                - sensor.back_porch_temp_sensor_zigbee_temperature
                - sensor.front_porch_motion_lr_temperature
                - sensor.garage_temp_sensor_temperature
                - sensor.honeywell_t_stat_main_floor_temperature
                - sensor.honeywell_t_stat_upstairs_temperature
                - sensor.basement_dart_temp_zigbee_temperature
                - sensor.garage_entry_motion_sensor_temperature
                - sensor.claires_bathroom_door_temperature
                - sensor.savannahs_bathroom_door_temperature
                - sensor.hudsons_bedroom_door_temperature
              card:
                type: markdown
                card_mod:
                  style: >
                    ha-card { background: rgba(0,0,0,0.3) !important;
                    border-radius: 12px; padding: 8px; height: 100%; }
                content: >
                  <table style="width: 100%; border-collapse: collapse; border:
                  none; table-layout: fixed;"> {% set items = [
                    ('sensor.outside_temperature_temperature','Outdoor Ambient','ext'),
                    ('sensor.back_porch_temp_sensor_zigbee_temperature','Back Porch','ext'),
                    ('sensor.front_porch_motion_lr_temperature','Front Porch','ext'),
                    ('sensor.garage_temp_sensor_temperature','Garage','ext'),
                    ('sensor.honeywell_t_stat_main_floor_temperature','T-Stat Main','int'),
                    ('sensor.honeywell_t_stat_upstairs_temperature','T-Stat Master','int'),
                    ('sensor.basement_dart_temp_zigbee_temperature','Basement','int'),
                    ('sensor.garage_entry_motion_sensor_temperature','Mud Room','int'),
                    ('sensor.claires_bathroom_door_temperature',"Claire's Room",'int'),
                    ('sensor.savannahs_bathroom_door_temperature',"Savi's Room",'int'),
                    ('sensor.hudsons_bedroom_door_temperature',"Hud's Room",'int')
                  ] %} {% for s in items -%}
                    {% set t = states(s[0]) | float(0) %}
                    {% set last_ch = relative_time(states[s[0]].last_changed) if states[s[0]] else '?' %}
                    {% if s[2] == 'ext' %}
                      {% set color = 'blue' if t < 40 else ('#4caf50' if t <= 90 else 'purple') %}
                    {% else %}
                      {% set color = 'blue' if t < 65 else ('#4caf50' if t <= 74 else 'red') %}
                    {% endif %}
                    <tr>
                      <td style="width: 25px; padding: 4px 0; border: none; text-align: center;"><font color="{{ color }}" style="font-size: 16px;">❄</font></td>
                      <td style="width: 120px; font-family: monospace; font-size: 12px; border: none; white-space: nowrap;">{{ s[1] }}</td>
                      <td style="width: 60px; font-family: monospace; font-size: 12px; text-align: left; border: none; white-space: nowrap;"><font color="{{ color }}"><b>{{ "%5.1f"|format(t) }}°</b></font></td>
                      <td style="font-family: monospace; font-size: 9px; text-align: right; opacity: 0.5; border: none;">{{ last_ch }}</td>
                    </tr>
                  {%- endfor %} </table>
            - type: custom:config-template-card
              entities:
                - binary_sensor.gate_alley_yard_lr_contact
                - binary_sensor.gate_front_yard_lr_contact
                - binary_sensor.gate_trash_lr_contact
                - binary_sensor.kitchen_screen_door_lr_contact
                - binary_sensor.garage_door_tilt_contact
                - binary_sensor.front_door_sensor_contact
                - lock.front_door_lock
                - binary_sensor.garage_house_door_sensor_contact
                - lock.garage_house_lock
                - binary_sensor.garage_yard_door_sensor_contact
                - lock.garage_yard_lock
              card:
                type: markdown
                card_mod:
                  style: >
                    ha-card { background: rgba(0,0,0,0.3) !important;
                    border-radius: 12px; padding: 8px; height: 100%; }
                content: >
                  {% set gates = [
                    ('binary_sensor.gate_alley_yard_lr_contact','Alley Gate'),
                    ('binary_sensor.gate_front_yard_lr_contact','Back Yard Gate'),
                    ('binary_sensor.gate_trash_lr_contact','Front Yard Gate'),
                    ('binary_sensor.kitchen_screen_door_lr_contact','Kitchen Screen'),
                    ('binary_sensor.garage_door_tilt_contact','Garage Door')
                  ] %} {% set doors = [
                    ('binary_sensor.front_door_sensor_contact', 'lock.front_door_lock', 'Front Door'),
                    ('binary_sensor.garage_house_door_sensor_contact', 'lock.garage_house_lock', 'Garage House'),
                    ('binary_sensor.garage_yard_door_sensor_contact', 'lock.garage_yard_lock', 'Garage Yard')
                  ] %} <table style="width: 100%; border-collapse: collapse;
                  border: none;"> {% for g in gates -%}
                    {% set obj = states[g[0]] %}
                    {% set state = obj.state if obj else 'unknown' %}
                    {% set last_ch = relative_time(obj.last_changed) if obj else '?' %}
                    {% set color = 'red' if state == 'on' else 'green' %}
                    <tr>
                      <td style="width: 30px; padding: 4px 0; border: none;"><ha-icon icon="{{ 'mdi:door-open' if state == 'on' else 'mdi:door-closed' }}" style="color: {{ color }} !important; --mdc-icon-size: 18px;"></ha-icon></td>
                      <td style="width: 120px; font-family: monospace; font-size: 12px; border: none;">{{ g[1] }}</td>
                      <td style="width: 50px; font-family: monospace; font-size: 11px; text-align: right; border: none;"><b><font color="{{ color }}">{{ 'OPEN' if state == 'on' else 'OK' }}</font></b></td>
                      <td style="font-family: monospace; font-size: 9px; text-align: right; opacity: 0.5; border: none;">{{ last_ch }}</td>
                    </tr>
                  {%- endfor %} {% for d in doors -%}
                    {% set contact = states(d[0]) %}
                    {% set lock_state = states(d[1]) %}
                    {% set is_locked = lock_state == 'locked' %}
                    {% set lock_bg = '#2e7d32' if is_locked else '#d32f2f' %}
                    {% set contact_color = 'red' if contact == 'on' else 'green' %}
                    <tr>
                      <td style="width: 30px; padding: 4px 0; border: none;">
                        <div style="background-color: {{ lock_bg }}; border-radius: 4px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;">
                          <ha-icon icon="{{ 'mdi:lock' if is_locked else 'mdi:lock-open-variant' }}" style="color: white !important; --mdc-icon-size: 12px;"></ha-icon>
                        </div>
                      </td>
                      <td style="width: 120px; font-family: monospace; font-size: 12px; border: none;">{{ d[2] }}</td>
                      <td style="width: 50px; font-family: monospace; font-size: 11px; text-align: right; border: none;"><b><font color="{{ contact_color }}">{{ 'OPEN' if contact == 'on' else 'OK' }}</font></b></td>
                    </tr>
                  {%- endfor %} </table>
            - type: markdown
              card_mod:
                style: >
                  ha-card { background: rgba(0,0,0,0.3) !important;
                  border-radius: 12px; padding: 8px; height: 100%; }
              content: >
                <table style="width: 100%; border-collapse: collapse; border:
                none; table-layout: fixed;"> {% set freezers = [
                  ('sensor.chest_freezer_temp_temperature','Chest Freezer'),
                  ('sensor.basement_freezer_lr_temperature','Basement Freezer'),
                  ('sensor.basement_freezer_lr_temperature','Kitchen Freezer')
                ] %} {% set fridges = [
                  ('sensor.basement_fridge_temp_sensor_temperature','Kitchen Fridge'),
                  ('sensor.basement_fridge_temp_sensor_temperature','Basement Fridge'),
                  ('sensor.keezer_temp_lr_temperature','Kegerator')
                ] %} {% for s in freezers -%}
                  {% set t = states(s[0]) | float(0) %}
                  {% set color = 'blue' if t < 20 else ('yellow' if t <= 30 else 'red') %}
                  <tr>
                    <td style="width: 25px; padding: 4px 0; border: none; text-align: center;"><font color="{{ color }}" style="font-size: 16px;">❄</font></td>
                    <td style="width: 120px; font-family: monospace; font-size: 12px; border: none; white-space: nowrap;">{{ s[1] }}</td>
                    <td style="width: 50px; font-family: monospace; font-size: 12px; text-align: right; border: none;"><font color="{{ color }}"><b>{{ "%5.1f"|format(t) }}°</b></font></td>
                  </tr>
                {%- endfor %} <tr><td colspan="3" style="border-bottom: 1px
                solid rgba(255,255,255,0.1);"></td></tr> {% for s in fridges -%}
                  {% set t = states(s[0]) | float(0) %}
                  {% set color = 'blue' if t <= 38 else ('yellow' if t <= 45 else 'red') %}
                  <tr>
                    <td style="width: 25px; padding: 4px 0; border: none; text-align: center;"><font color="{{ color }}" style="font-size: 16px;">❄</font></td>
                    <td style="width: 120px; font-family: monospace; font-size: 12px; border: none; white-space: nowrap;">{{ s[1] }}</td>
                    <td style="width: 50px; font-family: monospace; font-size: 12px; text-align: right; border: none;"><font color="{{ color }}"><b>{{ "%5.1f"|format(t) }}°</b></font></td>
                  </tr>
                {%- endfor %} </table>
