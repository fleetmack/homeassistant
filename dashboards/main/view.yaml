                  ('sensor.hudsons_bedroom_door_temperature',"Hud's Room",'int')
                ] %} {% for s in items -%} {% set t = states(s[0]) | float(0) %}
                {% set last_ch = relative_time(states[s[0]].last_changed) ~ "
                ago" if states[s[0]] else "?" %} {% if s[2] == 'ext' %} {% set
                color = 'blue' if t < 40 else ('#4caf50' if t <= 90 else
                'purple') %} {% else %} {% set color = 'blue' if t < 65 else
                ('#4caf50' if t <= 74 else 'red') %} {% endif %} <tr> <td
                style="width: 30px; padding: 6px 0; border: none; text-align:
                center;"><font color="{{ color }}" style="font-size:
                16px;">❄</font></td> <td style="width: 150px; font-family:
                monospace; font-size: 13px; border: none; white-space: nowrap;
                text-align: left;">{{ s[1] }}</td> <td style="width: 70px;
                font-family: monospace; font-size: 13px; text-align: left;
                border: none;"><font color="{{ color }}"><b>{{ "%5.1f"|format(t)
                }}°</b></font></td> <td style="font-family: monospace;
                font-size: 10px; text-align: right; opacity: 0.6; border: none;
                white-space: nowrap;">{{ last_ch }}</td> </tr> {%- endfor %}
                </table> </div>
