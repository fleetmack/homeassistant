                - type: custom:mushroom-template-card
                  entity: light.savannah_dome_lights
                  primary: Main Light
                  secondary: Tap for Color
                  icon: mdi:palette
                  layout: horizontal
                  tap_action:
                    action: more-info
                  card_mod:
                    style: |
                      :host { flex: 1 1 70% !important; }
            - type: horizontal-stack
              cards:
                - type: custom:mushroom-template-card
                  entity: light.savannah_auxiliary_switch
                  icon: mdi:power
                  icon_color: "{{ 'blue' if is_state(entity, 'on') else 'grey' }}"
                  layout: vertical
                  tap_action:
                    action: toggle
                  card_mod:
                    style: |
                      :host { flex: 0 0 30% !important; }
                      ha-card { height: 100%; }
                - type: custom:mushroom-template-card
                  entity: light.hue_savannah_light_strip
                  primary: Strip
                  secondary: Tap for Color
                  icon: mdi:led-strip-variant
                  layout: horizontal
                  tap_action:
                    action: more-info
                  card_mod:
                    style: |
                      :host { flex: 1 1 70% !important; }
            - type: custom:mushroom-cover-card
              entity: cover.savannah_blinds_homekit
              name: Blinds
              show_position_control: true
              show_buttons_control: true
            - type: custom:mini-media-player
              entity: media_player.savannah_display
              name: Savannah's Mini
              artwork: material
              hide:
                power: true
                source: true
  - type: custom:decluttering-card
    template: global_calendar
    view_layout:
      grid-area: calendar
