title: Kitchen
path: kitchen
type: custom:grid-layout
layout:
  grid-template-columns: 260px 1fr 300px
  grid-template-rows: auto 1fr
  grid-template-areas: |
    "header header header"
    "sidebar main calendar"
  grid-gap: 10px
background:
  opacity: 100
  alignment: center
  size: cover
  repeat: repeat
  attachment: fixed
  image:
    media_content_id: media-source://image_upload/8d3c6f0e528ca139e833ce669b24cc9a
    media_content_type: image/jpeg
cards:
  - type: custom:decluttering-card
    template: global_header
    view_layout:
      grid-area: header
  - type: custom:decluttering-card
    template: global_sidebar
    view_layout:
      grid-area: sidebar
  - type: custom:mod-card
    view_layout:
      grid-area: main
    card_mod:
      style: |
        ha-card { 
          background: rgba(150, 150, 150, 0.05); 
          border-radius: 20px;
          border: 1px solid rgba(255, 255, 255, 0.1); 
          padding: 10px; 
        }
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-chips-card
          alignment: start
          card_mod:
            style: |
              mushroom-chip { margin-right: 10px !important; }
          chips:
            - type: template
              entity: climate.honeywell_t_stat_main_floor
              icon: mdi:thermometer
              icon_color: orange
              content: "Temp: {{ state_attr(entity, 'current_temperature') }}°"
            - type: template
              entity: binary_sensor.kitchen_motion_motion
              icon: mdi:motion-sensor
              icon_color: "{{ 'red' if is_state(entity, 'on') else 'grey' }}"
              content: >
                {% set last =
                states.binary_sensor.kitchen_motion_motion.last_changed %}  
                Last Motion: {{ "Now" if is_state(entity, 'on') else
                as_timestamp(last) | timestamp_custom('%-I:%M %p') }}
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-light-card
              entity: light.kitchen_cabinets
              name: Cabinets
              use_light_color: true
              show_brightness_control: true
              show_color_control: true
              show_color_temp_control: true
              collapsible_controls: false
            - type: custom:stack-in-card
              mode: horizontal
              keep:
                margin: false
                box_shadow: false
                outer_padding: false
              cards:
                - type: custom:mushroom-template-card
                  entity: light.kitchen_island_pendants
                  icon: mdi:power
                  icon_color: "{{ 'amber' if is_state(entity, 'on') else 'grey' }}"
                  layout: vertical
                  tap_action:
                    action: toggle
                  card_mod:
                    style: |
                      :host { flex: 0 0 30% !important; }
                      ha-card { 
                        border-right: 1px solid rgba(255,255,255,0.1) !important;
                        height: 106px !important;
                        background: none !important;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                      }
                - type: custom:mushroom-template-card
                  entity: light.kitchen_pendants_2
                  primary: Island
                  secondary: Color Control
                  icon: mdi:palette
                  layout: vertical
                  tap_action:
                    action: more-info
                  card_mod:
                    style: |
                      :host { flex: 1 1 70% !important; }
                      ha-card { 
                        height: 106px !important;
                        background: none !important;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                      }
              card_mod:
                style: |
                  ha-card { 
                    border: 1px solid var(--divider-color) !important;
                    height: 106px !important;
                  }
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:mushroom-light-card
              entity: light.kitchen_table_chandelier
              name: Chandelier
            - type: custom:mushroom-light-card
              entity: light.kitchen_island_ceiling_lights
              name: Island Ceiling
            - type: custom:mushroom-entity-card
              entity: switch.pantry_and_cubbie
              name: Pantry
              icon: mdi:door-open
              tap_action:
                action: toggle
        - type: custom:mushroom-title-card
          title: Living & Entry
        - type: grid
          columns: 4
          square: false
          cards:
            - type: custom:mushroom-light-card
              entity: light.living_room_ceiling_lights
              name: Living
              icon: mdi:sofa
            - type: custom:mushroom-light-card
              entity: light.piano_lights_lutron
              name: Piano
              icon: mdi:piano
            - type: custom:mushroom-light-card
              entity: light.front_entry_lights
              name: Entry
            - type: custom:mushroom-light-card
              entity: light.upstairs_lights
              name: Upstairs
        - type: custom:mini-media-player
          entity: media_player.living_room_sonos
          artwork: material
          hide:
            power: true
            icon: false
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:mushroom-cover-card
              entity: cover.living_room_shades_12
              name: Living Shades
              show_position_control: true
            - type: custom:mushroom-cover-card
              entity: cover.kitchen_shades_21
              name: Kitchen Shades
              show_position_control: true
            - type: custom:mushroom-cover-card
              entity: cover.piano_shades_17
              name: Piano Shades
              show_position_control: true
  - type: custom:decluttering-card
    template: global_calendar
    view_layout:
      grid-area: calendar
