title: Alerts
path: alerts
type: custom:grid-layout
layout:
  grid-template-columns: 260px 1fr 300px
  grid-template-rows: auto 1fr
  grid-template-areas: |
    "header header header"
    "sidebar main calendar"
  grid-gap: 10px
background:
  opacity: 100
  alignment: center
  size: cover
  repeat: repeat
  attachment: fixed
  image:
    media_content_id: media-source://image_upload/8d3c6f0e528ca139e833ce669b24cc9a
    media_content_type: image/jpeg
cards:
  - type: custom:decluttering-card
    template: global_header
    view_layout:
      grid-area: header
  - type: custom:decluttering-card
    template: global_sidebar
    view_layout:
      grid-area: sidebar
  - type: custom:mod-card
    view_layout:
      grid-area: main
    card_mod:
      style: |
        ha-card { 
          background: rgba(30, 30, 30, 0.3) !important; 
          backdrop-filter: blur(12px); 
          -webkit-backdrop-filter: blur(12px);
          border-radius: 20px;
          border: 1px solid rgba(255, 255, 255, 0.15); 
          padding: 10px; 
        }
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-title-card
          title: Enable & Disable Custom Alerts
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-entity-card
              entity: switch.vs_garage_alert
              icon: mdi:garage-alert
              name: Garage Alerts
              tap_action:
                action: toggle
            - type: custom:mushroom-template-card
              primary: Disable Alarm Tonight
              secondary: |
                {% if is_state('switch.vs_disable_hsm', 'on') %}
                  Yes
                {% else %}
                  No
                {% endif %}
              entity: switch.vs_disable_hsm
              icon: mdi:moon-waning-crescent
              icon_color: >-
                {% if is_state('switch.vs_disable_hsm', 'on') %}amber{% else
                %}grey{% endif %}
              tap_action:
                action: toggle
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-entity-card
              entity: switch.vs_alarm_disarm_for_hass
              icon: mdi:alert-box
              name: Parrot
              tap_action:
                action: toggle
            - type: custom:mushroom-entity-card
              entity: switch.blue_iris_texts_vs
              icon: mdi:cellphone
              name: Front Porch Texts
              tap_action:
                action: toggle
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-entity-card
              entity: switch.yard_door_alerts_vs
              icon: mdi:alert-box
              name: Yard Alerts
              tap_action:
                action: toggle
        - type: custom:auto-entities
          show_empty: false
          card:
            type: entities
            title: Low Battery Warnings
            card_mod:
              style: |
                ha-card {
                  background: rgba(255, 0, 0, 0.1); /* Subtle red tint to indicate an alert */
                  border-radius: 12px;
                  border: 1px solid rgba(255, 0, 0, 0.3);
                }
          filter:
            include:
              - entity_id: sensor.*_battery
                state: <= 30
            exclude:
              - state: unavailable
              - state: unknown
          sort:
            method: state
            numeric: true
  - type: custom:decluttering-card
    template: global_calendar
    view_layout:
      grid-area: calendar
