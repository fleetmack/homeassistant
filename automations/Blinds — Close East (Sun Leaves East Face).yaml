alias: Blinds — Close East (Sun Leaves East Face)
description: ""
triggers:
  - entity_id: sun.sun
    attribute: azimuth
    above: 135
    trigger: numeric_state
conditions:
  - condition: template
    value_template: "{{ now().month >= 4 and now().month <= 10 }}"
  - condition: numeric_state
    entity_id: sun.sun
    attribute: elevation
    above: 5
  - condition: template
    value_template: "{{ now().hour < 13 }}"
actions:
  - target:
      entity_id:
        - cover.entry_blinds_homekit
        - cover.top_of_stairs
        - cover.laundy
        - cover.loft_loft_east_left
        - cover.loft_loft_east_middle
        - cover.loft_loft_east_right
        - cover.piano_blinds_piano_ne
        - cover.piano_blinds_piano_se
    action: cover.close_cover
mode: single
