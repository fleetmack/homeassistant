alias: "HVAC: Daily Mode by Forecast High"
description: Sets HVAC mode once a day based purely on the forecasted high temperature.
triggers:
  - trigger: time
    at: "06:00:00"
actions:
  - choose:
      - conditions:
          - condition: numeric_state
            entity_id: sensor.today_forecast_high
            above: 78
        sequence:
          - target:
              entity_id:
                - climate.honeywell_t_stat_main_floor
                - climate.honeywell_t_stat_upstairs
            data:
              hvac_mode: cool
            action: climate.set_hvac_mode
          - data:
              title: HVAC Update ❄️
              message: Today's high is over 78°F. System set to COOL.
            action: notify.notify
      - conditions:
          - condition: numeric_state
            entity_id: sensor.today_forecast_high
            below: 60
        sequence:
          - target:
              entity_id:
                - climate.honeywell_t_stat_main_floor
                - climate.honeywell_t_stat_upstairs
            data:
              hvac_mode: heat
            action: climate.set_hvac_mode
          - data:
              title: HVAC Update 🌡️
              message: Today's high is below 65°F. System set to HEAT.
            action: notify.notify
    default:
      - target:
          entity_id:
            - climate.honeywell_t_stat_main_floor
            - climate.honeywell_t_stat_upstairs
        data:
          hvac_mode: "off"
        action: climate.set_hvac_mode
      - data:
          title: HVAC Update 🌬️
          message: Today's high is mild. System turned OFF.
        action: notify.notify
mode: single
