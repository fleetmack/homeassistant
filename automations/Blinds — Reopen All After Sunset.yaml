alias: Blinds — Reopen All After Sunset
description: ""
triggers:
  - entity_id: sun.sun
    attribute: elevation
    below: -1
    trigger: numeric_state
conditions:
  - condition: template
    value_template: "{{ now().month >= 4 and now().month <= 10 }}"
  - condition: template
    value_template: "{{ states('sun.sun') == 'below_horizon' }}"
    alias: Only fire at evening sunset, not pre-dawn
actions:
  - target:
      entity_id:
        - cover.piano_shades_all_homekit
        - cover.office_shades_all_homekit
        - cover.entry_blinds_homekit
        - cover.living_room_shades_all_homekit
        - cover.kitchen_shades_all_homekit
    action: cover.open_cover
mode: single
