alias: Xcel Peak — End Float, Return to Comfort (9pm)
description: ""
triggers:
  - at: "21:00:00"
    trigger: time
conditions:
  - condition: template
    value_template: "{{ now().month >= 5 and now().month <= 9 }}"
  - condition: state
    entity_id: input_boolean.thermostat_manual_override
    state: "off"
  - condition: template
    value_template: >
      {{ states('climate.honeywell_t_stat_main_floor') == 'cool'  or
      states('climate.honeywell_t_stat_main_floor') == 'fan_only' }}
    alias: Only run if A/C is in cooling or fan mode, not heating
actions:
  - target:
      entity_id: climate.honeywell_t_stat_main_floor
    data:
      temperature: 74
    action: climate.set_temperature
  - target:
      entity_id: climate.honeywell_t_stat_upstairs
    data:
      temperature: 75
    action: climate.set_temperature
  - data:
      title: ✅ Peak hours over
      message: >
        9pm — Xcel peak window closed. Comfort setpoints restored. Checking if
        it's cool enough to open windows…
    action: notify.send_message
    target:
      entity_id: notify.pixel_9_pro
mode: single
