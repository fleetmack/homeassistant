alias: "Theater Sync: TV Power (Final - Using Correct Entity)"
description: Switched to the primary Denon entity that supports power commands
triggers:
  - trigger: state
    entity_id: media_player.samsung_q60_series_75_hass
    to: "on"
    id: tv_on
  - trigger: state
    entity_id: media_player.samsung_q60_series_75_hass
    to: "off"
    id: tv_off
actions:
  - choose:
      - conditions:
          - condition: trigger
            id: tv_on
        sequence:
          - action: media_player.turn_on
            target:
              entity_id: media_player.denon_avr_x3800h
          - action: light.turn_on
            target:
              entity_id: light.basement_tv_strip_inovelli
            data:
              brightness_pct: 70
      - conditions:
          - condition: trigger
            id: tv_off
        sequence:
          - action: media_player.turn_off
            target:
              entity_id: media_player.denon_avr_x3800h
          - action: light.turn_off
            target:
              entity_id: light.basement_tv_strip_inovelli
mode: restart
