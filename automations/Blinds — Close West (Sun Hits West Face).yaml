alias: Blinds — Close West (Sun Hits West Face)
description: ""
triggers:
  - entity_id: sun.sun
    attribute: azimuth
    above: 225
    trigger: numeric_state
conditions:
  - condition: template
    value_template: "{{ now().month >= 4 and now().month <= 10 }}"
  - condition: numeric_state
    entity_id: sun.sun
    attribute: elevation
    above: 10
  - condition: state
    entity_id: input_boolean.blinds_manual_override
    state: "off"
  - condition: template
    value_template: "{{ now().hour >= 12 and now().hour < 17 }}"
actions:
  - target:
      entity_id:
        - cover.living_room_shades_all_homekit
        - cover.kitchen_shades_all_homekit
    action: cover.close_cover
mode: single
